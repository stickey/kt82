<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KT82 — Pre-Race Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #e7e4de; }
  * { box-sizing: border-box; }
  body { font-family: 'Hanken Grotesk', system-ui, sans-serif; }
  @keyframes pr-pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.35; transform: scale(0.82); } }
  .pr-pulse { animation: pr-pulse 1.3s ease-in-out infinite; }
</style>
</head>
<body>
<div id="root"></div>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#13110a"/>
    <rect x="24" y="40" width="52" height="20" rx="4" fill="#ff5a1f"/>
    <text x="50" y="55" font-family="Arial" font-size="13" font-weight="bold" fill="#13110a" text-anchor="middle">7:00</text>
    <circle cx="50" cy="26" r="5" fill="#ff5a1f"/>
  </svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="kt82-data.js"></script>
<script src="kt82-legs-data.js?v=2"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="pre-race.jsx?v=4"></script>

<script type="text/babel">
  const { useState, useEffect } = React;
  const { IOSDevice, PreRaceScreen, useTweaks, TweaksPanel, TweakSection, TweakRadio, TweakColor, TweakSlider } = window;

  const P_BODY = "'Hanken Grotesk', sans-serif";
  const DW = 402, DH = 874;
  const PAGE_LOAD = Date.now();

  function tokB(theme) {
    return theme === 'light'
      ? { bg:'#f4f0e7', panel:'#ffffff', panel2:'#faf6ec', line:'rgba(0,0,0,0.09)', line2:'rgba(0,0,0,0.05)',
          text:'#1a160f', mut:'#6f6759', faint:'#b0a795', accent:'#e8480f',
          green:'#0e9b52', red:'#dd3a23', amber:'#c47d12', ink:'#ffffff' }
      : { bg:'#13110a', panel:'#1d1810', panel2:'#241d12', line:'rgba(255,240,220,0.10)', line2:'rgba(255,240,220,0.055)',
          text:'#fbf6ee', mut:'#a99e8c', faint:'#6a6053', accent:'#ff5a1f',
          green:'#37d27a', red:'#ff4d2e', amber:'#ffae3b', ink:'#13110a' };
  }
  function tok(theme, accent) {
    const base = tokB(theme);
    return accent ? { ...base, accent } : base;
  }

  const ACCENTS = ['#ff5a1f', '#ff2e63', '#2b6fff', '#7a5af0'];
  const TEAMS = ['RunGMC', 'Trail Mix', 'Sole Patrol', 'Katy Did'];

  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "theme": "light",
    "accent": "#ff5a1f",
    "teamName": "RunGMC",
    "hoursUntil": 2
  }/*EDITMODE-END*/;

  function Shell() {
    const [tw, setTweak] = useTweaks(TWEAK_DEFAULTS);
    const [scale, setScale] = useState(1);
    const t = tok(tw.theme, tw.accent);
    const dark = tw.theme === 'dark';

    useEffect(() => {
      const fit = () => setScale(Math.min(1, (window.innerHeight - 140) / DH));
      fit();
      window.addEventListener('resize', fit);
      return () => window.removeEventListener('resize', fit);
    }, []);

    const startTime = new Date(PAGE_LOAD + tw.hoursUntil * 3600 * 1000);

    return (
      <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', padding: '20px 16px 36px' }}>
        <div style={{ fontFamily: P_BODY, fontWeight: 800, fontSize: 12, letterSpacing: '0.16em', color: '#9a9183', marginBottom: 16, textTransform: 'uppercase' }}>
          KT82 · Pre-Race Tracker
        </div>
        <div style={{ width: DW * scale, height: DH * scale }}>
          <div style={{ width: DW, height: DH, transform: `scale(${scale})`, transformOrigin: 'top left' }}>
            <IOSDevice dark={dark} width={DW} height={DH}>
              <PreRaceScreen teamName={tw.teamName} startTime={startTime} t={t} />
            </IOSDevice>
          </div>
        </div>

        <TweaksPanel>
          <TweakSection label="Team" />
          <TweakRadio label="Team" value={tw.teamName} options={TEAMS}
            onChange={v => setTweak('teamName', v)} />
          <TweakSlider label="Hours to start" value={tw.hoursUntil} min={0.25} max={12} step={0.25} unit="h"
            onChange={v => setTweak('hoursUntil', v)} />
          <TweakSection label="Appearance" />
          <TweakRadio label="Theme" value={tw.theme} options={['dark', 'light']}
            onChange={v => setTweak('theme', v)} />
          <TweakColor label="Accent" value={tw.accent} options={ACCENTS}
            onChange={v => setTweak('accent', v)} />
        </TweaksPanel>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<Shell />);
</script>
</body>
</html>
